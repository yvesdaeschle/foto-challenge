<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#f7b52c"/>
  <g transform="translate(256,240)">
    <!-- Camera body -->
    <rect x="-100" y="-65" width="200" height="140" rx="24" fill="#080808"/>
    <!-- Lens -->
    <circle cx="0" cy="5" r="45" fill="none" stroke="#f7b52c" stroke-width="8"/>
    <circle cx="0" cy="5" r="25" fill="#f7b52c" opacity="0.3"/>
    <!-- Flash -->
    <rect x="50" y="-58" width="30" height="14" rx="4" fill="#f7b52c" opacity="0.6"/>
    <!-- Viewfinder -->
    <rect x="-25" y="-90" width="50" height="30" rx="8" fill="#080808"/>
  </g>
  <text x="256" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#080808">FOTO CHALLENGE</text>
</svg>
