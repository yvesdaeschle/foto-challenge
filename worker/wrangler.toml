name = "white-unit-000b"
main = "src/index.js"
compatibility_date = "2026-05-07"

[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "foto-challenge-uploads"

[vars]
MAX_FILE_SIZE_MB = "12"

# Production environment
[env.production]
vars = { ALLOWED_ORIGIN = "https://foto-challenge.pages.dev" }

# Staging environment
[env.staging]
vars = { ALLOWED_ORIGIN = "https://staging.foto-challenge.pages.dev" }

# Development environment
[env.development]
vars = { ALLOWED_ORIGIN = "http://localhost:5173" }
